apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mistralai-internship.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "mistralai-internship.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "mistralai-internship.name" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mistral-secrets
                  key: api-key
