apiVersion: v1
kind: Service
metadata:
  name: {{ include "mistralai-internship.fullname" . }}-backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ include "mistralai-internship.name" . }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.port }}
